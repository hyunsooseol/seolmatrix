title: Group Network Comparison
name: netcomp
jus: '3.0'
stage: 0
compilerMode: tame
children:
  - type: VariableSupplier
    persistentItems: false
    stretchFactor: 1
    children:
      - type: TargetLayoutBox
        label: Variables
        children:
          - type: VariablesListBox
            name: vars
            isTarget: true
      - type: TargetLayoutBox
        label: Grouping Variable
        children:
          - type: VariablesListBox
            name: group
            maxItemCount: 1
            isTarget: true
            ghostText: 2 levels only
  - type: LayoutBox
    margin: large
    stretchFactor: 1
    children:
      - type: LayoutBox
        cell:
          column: 0
          row: 0
        stretchFactor: 1
        children:
          - type: ActionButton
            name: run
      - type: LayoutBox
        cell:
          column: 1
          row: 0
        stretchFactor: 0
        children:
          - type: ComboBox
            name: dataType
  - type: CollapseBox
    label: Network comparison
    collapsed: true
    children:
      - type: LayoutBox
        margin: large
        cell:
          column: 0
          row: 0
        stretchFactor: 1
        children:
          - type: Label
            label: 'Network plot'
            children:        
              - type: CheckBox
                name: showPlots
                children:
                  - type: ComboBox
                    name: layout
                    enable: (showPlots)
      - type: LayoutBox
        margin: large
        cell:
          column: 1
          row: 0
        stretchFactor: 1
        children:
          - type: Label
            label: 'Tests'  
            children:
              - type: CheckBox
                name: testStructure
              - type: CheckBox
                name: testGlobalStrength
  - type: CollapseBox
    label: Advanced
    collapsed: true
    children:
      - type: TextBox
        name: nPerm
        format: number
      - type: CheckBox
        name: testEdges

