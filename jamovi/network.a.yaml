---
name:  network
title: Directed Graph Centrality
menuGroup: seolmatrix
version: '1.0.0'
jas: '1.2'

options:
    - name: data
      type: Data
      description:
          R: >
            The data as a data frame.

    - name: labels
      title: 'Labels'
      type: Variable
      suggested:
         - nominal
      permitted:
        - id
        - factor

    - name: vars
      title: Variables
      type: Variables

    - name: cen
      title: 'Centrality'
      type: Bool
      default: TRUE

    - name: plot
      title: 'Directed Graph Centrality'
      type: Bool
      default: false

    - name: plot1
      title: 'Centrality plot'
      type: Bool
      default: false

    - name: plotMetric
      title: Centrality index
      type: List
      options:
        - name: pagerank
          title: PageRank
        - name: indegree
          title: InDegree
        - name: outdegree
          title: OutDegree
        - name: betweenness
          title: Betweenness
        - name: closeness
          title: Closeness
        - name: hub
          title: Hub
        - name: authority
          title: Authority
        - name: outex
          title: OutExpectedInfluence
        - name: inex
          title: InExpectedInfluence
      default: pagerank

    - name: absWeight
      title: 'Absolute weights (|w|)'
      type: List
      options:
        - title: 'TRUE'
          name:  'TRUE'
        - title: 'FALSE'
          name: 'FALSE'
      default: 'TRUE'


    - name: threshold
      title: 'Edge threshold'
      type: Number
      default: 0
      min: 0
      max: 1


...
